autoware_system_design_format: 0.3.0

# node information
name: LivoxTagFilter.node

package:
  name: autoware_livox_tag_filter
  provider: autoware

launch:
  plugin: autoware::livox_tag_filter::LivoxTagFilterNode
  executable: autoware_livox_tag_filter_node
  node_output: screen

# interfaces
subscribers:
  - name: input
    message_type: sensor_msgs/msg/PointCloud2
    remap_target: input

publishers:
  - name: output
    message_type: sensor_msgs/msg/PointCloud2
    remap_target: output

# parameters
param_files:
  - name: param_file
    default: config/livox_tag_filter.param.yaml

param_values: []

# processes
processes:
  - name: filter
    trigger_conditions:
      - on_input: input
    outcomes:
      - to_output: output
