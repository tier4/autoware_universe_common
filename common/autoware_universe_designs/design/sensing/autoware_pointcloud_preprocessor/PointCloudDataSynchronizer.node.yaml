autoware_system_design_format: 0.3.0

# node information
name: PointCloudDataSynchronizer.node

package:
  name: autoware_pointcloud_preprocessor
  provider: autoware

launch:
  plugin: autoware::pointcloud_preprocessor::PointCloudDataSynchronizerComponent
  executable: time_synchronizer_node
  node_output: screen

# interfaces
# NOTE: input clouds are built dynamically from the input_topics parameter
# (input1/input2 shown as representative sockets). For each input topic a
# time-synchronized cloud is republished with the synchronized_pointcloud_postfix
# (output1/output2 representative). The twist input is selectable via
# input_twist_topic_type: "twist" (TwistWithCovarianceStamped, default) or
# "odom" (nav_msgs/Odometry) on ~/input/odom.
subscribers:
  - name: twist
    message_type: geometry_msgs/msg/TwistWithCovarianceStamped
    remap_target: ~/input/twist
  - name: input1
    message_type: sensor_msgs/msg/PointCloud2
  - name: input2
    message_type: sensor_msgs/msg/PointCloud2

publishers:
  - name: output1
    message_type: sensor_msgs/msg/PointCloud2
  - name: output2
    message_type: sensor_msgs/msg/PointCloud2

# parameters
param_files:
  - name: param_file
    default: config/time_synchronizer_node.param.yaml

param_values:
  - name: output_frame
    type: string
    default: base_link
  - name: input_topics
    type: array
    default: "[${input input1}, ${input input2}]"

# processes
processes:
  - name: synchronize
    trigger_conditions:
      - on_input: input1
      - on_input: input2
    outcomes:
      - to_output: output1
      - to_output: output2
