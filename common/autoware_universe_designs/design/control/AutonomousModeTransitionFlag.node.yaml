autoware_system_design_format: 0.3.0
# node information
name: AutonomousModeTransitionFlag.node
package:
  name: autoware_operation_mode_transition_manager
  provider: autoware
launch:
  plugin: autoware::operation_mode_transition_manager::AutonomousModeTransitionFlagNode
  executable: autonomous_mode_transition_flag_node
  node_output: screen
# interfaces
subscribers:
  - name: kinematics
    message_type: nav_msgs/msg/Odometry
    remap_target: kinematics
  - name: trajectory
    message_type: autoware_planning_msgs/msg/Trajectory
    remap_target: trajectory
  - name: control_cmd
    message_type: autoware_control_msgs/msg/Control
    remap_target: control_cmd
  - name: trajectory_follower_control_cmd
    message_type: autoware_control_msgs/msg/Control
    remap_target: trajectory_follower_control_cmd
publishers:
  - name: transition_available
    message_type: tier4_system_msgs/msg/ModeChangeAvailable
    global: /system/command_mode/transition/available
  - name: transition_completed
    message_type: tier4_system_msgs/msg/ModeChangeAvailable
    global: /system/command_mode/transition/completed
  - name: debug_info
    message_type: autoware_operation_mode_transition_manager/msg/OperationModeTransitionManagerDebug
    remap_target: ~/debug_info
# parameters
param_files:
  - name: operation_mode_transition_manager_param
    default: config/operation_mode_transition_manager.param.yaml
param_values: []
# processes
processes:
  - name: publish_transition_flags
    trigger_conditions:
      - periodic: 10.0
    outcomes:
      - to_output: transition_available
      - to_output: transition_completed
      - to_output: debug_info
