autoware_system_design_format: 0.3.0
# node information
name: ArTagBasedLocalizer.node
package:
  name: autoware_ar_tag_based_localizer
  provider: autoware
launch:
  plugin: ArTagBasedLocalizer
  executable: autoware_ar_tag_based_localizer_node
# interfaces
subscribers:
  - name: lanelet2_map
    message_type: autoware_map_msgs/msg/LaneletMapBin
  - name: image
    message_type: sensor_msgs/msg/Image
  - name: camera_info
    message_type: sensor_msgs/msg/CameraInfo
  - name: ekf_pose
    message_type: geometry_msgs/msg/PoseWithCovarianceStamped
publishers:
  - name: pose_with_covariance
    message_type: geometry_msgs/msg/PoseWithCovarianceStamped
  - name: image
    message_type: sensor_msgs/msg/Image
    remap_target: ~/debug/image
  - name: mapped_tag
    message_type: visualization_msgs/msg/MarkerArray
    remap_target: ~/debug/mapped_tag
  - name: detected_tag
    message_type: geometry_msgs/msg/PoseArray
    remap_target: ~/debug/detected_tag
  - name: diagnostics
    message_type: diagnostic_msgs/msg/DiagnosticArray
    global: /diagnostics
# parameters
param_files:
  - name: ar_tag_based_localizer_param
    default: config/ar_tag_based_localizer.param.yaml
param_values: []
# processes
processes:
  - name: estimate_pose_from_ar_tag
    trigger_conditions:
      - on_input: image
    outcomes:
      - to_output: pose_with_covariance
      - to_output: image
      - to_output: mapped_tag
      - to_output: detected_tag
      - to_output: diagnostics
