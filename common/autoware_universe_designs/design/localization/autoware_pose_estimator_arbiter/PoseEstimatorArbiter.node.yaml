autoware_system_design_format: 0.3.0
# node information
name: PoseEstimatorArbiter.node
package:
  name: autoware_pose_estimator_arbiter
  provider: autoware
launch:
  plugin: autoware::pose_estimator_arbiter::PoseEstimatorArbiter
  executable: autoware_pose_estimator_arbiter_node
# interfaces
subscribers:
  - name: ndt_pointcloud
    message_type: sensor_msgs/msg/PointCloud2
  - name: yabloc_image
    message_type: sensor_msgs/msg/Image
  - name: eagleye_pose_with_covariance
    message_type: geometry_msgs/msg/PoseWithCovarianceStamped
  - name: artag_image
    message_type: sensor_msgs/msg/Image
  - name: pose_with_covariance
    message_type: geometry_msgs/msg/PoseWithCovarianceStamped
  - name: pointcloud_map
    message_type: sensor_msgs/msg/PointCloud2
  - name: vector_map
    message_type: autoware_map_msgs/msg/LaneletMapBin
  - name: initialization_state
    message_type: autoware_adapi_v1_msgs/msg/LocalizationInitializationState
publishers:
  - name: diagnostics
    message_type: diagnostic_msgs/msg/DiagnosticArray
    global: /diagnostics
  - name: string
    message_type: std_msgs/msg/String
    remap_target: ~/debug/string
  - name: marker_array
    message_type: visualization_msgs/msg/MarkerArray
    remap_target: ~/debug/marker_array
  - name: ndt_pointcloud
    message_type: sensor_msgs/msg/PointCloud2
    remap_target: ~/output/ndt/pointcloud
  - name: yabloc_image
    message_type: sensor_msgs/msg/Image
    remap_target: ~/output/yabloc/image
  - name: eagleye_pose_with_covariance
    message_type: geometry_msgs/msg/PoseWithCovarianceStamped
    remap_target: ~/output/eagleye/pose_with_covariance
  - name: artag_image
    message_type: sensor_msgs/msg/Image
    remap_target: ~/output/artag/image
clients:
  - name: yabloc_trigger_srv
    message_type: std_srvs/srv/SetBool
# parameters
param_files: []
param_values: []
# processes
processes:
  - name: arbitrate_pose_estimators
    trigger_conditions:
      - periodic: 1.0 # Hz
    outcomes:
      - to_output: diagnostics
      - to_output: string
      - to_output: marker_array
