autoware_system_design_format: 0.3.0

# node information
name: VectorMapInsideAreaFilter.node

package:
  name: autoware_pointcloud_preprocessor
  provider: autoware

launch:
  plugin: autoware::pointcloud_preprocessor::VectorMapInsideAreaFilterComponent
  executable: vector_map_inside_area_filter_node
  node_output: screen

# interfaces
subscribers:
  - name: input
    message_type: sensor_msgs/msg/PointCloud2
    remap_target: input
  - name: vector_map
    message_type: autoware_map_msgs/msg/LaneletMapBin
    remap_target: input/vector_map

publishers:
  - name: output
    message_type: sensor_msgs/msg/PointCloud2
    remap_target: output

# parameters
param_files:
  - name: param_file
    default: config/vector_map_inside_area_filter_node.param.yaml

param_values:
  - name: input_frame
    type: string
    default: base_link
  - name: output_frame
    type: string
    default: base_link

# processes
processes:
  - name: filter
    trigger_conditions:
      - on_input: input
    outcomes:
      - to_output: output
